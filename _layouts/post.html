---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <span class="author">By {{ page.author }}</span>
      <span class="date">{{ page.date | date: "%B %d, %Y" }}</span>
      {% if page.tags %}
      <span class="tags">
        Tags: 
        {% for tag in page.tags %}
        <a href="{{ site.baseurl }}/tags/{{ tag }}" class="tag">{{ tag }}</a>
        {% endfor %}
      </span>
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
